    <style>

            padding: 0;

            font-family: "Microsoft YaHei", sans-serif;

        /* 顶部导航 */
        .top-bar {
            background: #1a2538;
            color: #fff;
            padding: 8px 50px;
            font-size: 13px;
            text-align: right;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: #fff;
            border-bottom: 1px solid #eee;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            color: #1a2538;
        }

        .nav a {
            margin-left: 35px;
            text-decoration: none;
            color: #333;
            font-size: 15px;
            font-weight: 500;
        }

        .nav a:hover {
            color: #0055b8;
        }

        /*  Banner 区域 */
        .banner {
            width: 100%;
            height: 480px;
            background: #0b1220;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 80px;
        }

        .banner h1 {
            font-size: 42px;
            margin-bottom: 18px;
        }

        .banner p {
            font-size: 18px;
            color: #ccc;
            max-width: 550px;
            line-height: 1.7;
        }

        /* 产品区块 */
        .product-section {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 26px;
            text-align: center;
            margin-bottom: 40px;
            color: #222;
        }

        .product-box {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .product-item {
            width: 31%;
            background: #f7f7f7;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 25px;
        }

        .product-img {
            height: 180px;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #666;
        }

        .product-info {
            padding: 20px;
        }

        .product-info h3 {
            font-size: 18px;
            margin-bottom: 10px;
            color: #222;
        }

        .product-info p {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }

        /* 底部 */
        .footer {
            background: #1a2538;
            color: white;
            text-align: center;
            padding: 35px 0;
            margin-top: 40px;
            font-size: 14px;
